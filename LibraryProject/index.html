<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS training</title>
    <link rel="stylesheet" href="CSS/main.css" />
  </head>
  <body>
    <div class="container">
      <div class="form">
        <input type="text" placeholder="input the title of the book" />
        <input type="text" placeholder="input the author of the book" />
        <input type="text" placeholder="input the number of pages" />
        <p>Did you read it?</p>
        <input type="radio" name="read" id="Yes" />
        <label for="Yes">Yes</label> <input type="radio" name="read" id="No" />
        <label for="No">No</label>
        <button class="AddBook BTN">Add Book</button>
      </div>
      <div class="adding">
        <p>Add new books to your library</p>
        <button class="newBook BTN">New Book</button>
      </div>
      <div class="booksGallery"></div>
    </div>
  </body>
  <script src="Script/main.js"></script>
</html>
